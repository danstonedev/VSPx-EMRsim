<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover, interactive-widget=resizes-content"
    />
    <title>UND EMR-Sim</title>
    <meta name="application-name" content="UND EMR-Sim" />
    <meta name="apple-mobile-web-app-title" content="UND EMR-Sim" />
    <meta
      name="description"
      content="Clinical EMR Simulator for multiple health professions — documentation, assessments, scheduling — pure frontend, no backend."
    />
    <meta name="color-scheme" content="light dark" />
    <link
      rel="icon"
      type="image/svg+xml"
      sizes="any"
      href="%sveltekit.assets%/img/EMRsim-flame.svg"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="%sveltekit.assets%/img/green-white-favicon.2.png"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="%sveltekit.assets%/img/EMRsim-flame-180.png"
    />
    <link rel="mask-icon" href="%sveltekit.assets%/img/EMRsim-flame.svg" color="#009A44" />
    <!-- Preconnect to Google Fonts (DNS + TLS handshake while HTML parses) -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <!-- Material Symbols — non-blocking load with font-display: swap.
         Axis restricted to single default point (was full 20..48/100..700/0..1/-50..200). -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
      media="print"
      onload="this.media = 'all'"
    />
    <noscript>
      <link
        rel="stylesheet"
        href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0&display=swap"
      />
    </noscript>
    %sveltekit.head%
  </head>
  <body data-sveltekit-preload-data="hover">
    <div style="display: contents">%sveltekit.body%</div>
  </body>
</html>
