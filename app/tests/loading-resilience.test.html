<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Loading Resilience Smoke Test</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          Segoe UI,
          Roboto,
          sans-serif;
        padding: 16px;
      }
      .test {
        margin-bottom: 12px;
      }
      .pass {
        color: #0a7;
      }
      .fail {
        color: #c00;
      }
      pre {
        background: #f6f8fa;
        padding: 8px;
        border-radius: 6px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <h1>Loading Resilience Smoke Test</h1>
    <p>
      Verifies route failure fallback wiring, CSS load timeout behavior, and access-code request
      timeout wiring.
    </p>
    <div id="results" aria-live="polite"></div>

    <script type="module">
      import { loadCSS } from '../js/core/css-optimizer.js';

      const results = document.getElementById('results');
      const failures = [];

      function log(name, ok, details = '') {
        const div = document.createElement('div');
        div.className = 'test ' + (ok ? 'pass' : 'fail');
        div.innerHTML =
          `<strong>${ok ? '✅' : '❌'} ${name}</strong>` + (details ? `<pre>${details}</pre>` : '');
        results.appendChild(div);
      }

      function assert(name, condition, details = '') {
        if (!condition) failures.push(name);
        log(name, condition, details);
      }

      async function checkSourceContracts() {
        const [routerSrc, accessGateSrc] = await Promise.all([
          fetch('../js/core/router.js').then((r) => r.text()),
          fetch('../js/ui/AccessGate.js').then((r) => r.text()),
        ]);

        assert(
          'Router has guarded render fallback',
          /catch \(error\)[\s\S]*renderRouteError\(app, path, error\)/.test(routerSrc),
          'Expected catch(error) => renderRouteError(app, path, error)',
        );

        assert(
          'Router has explicit no-renderer fallback',
          /No renderer registered for route/.test(routerSrc),
          'Expected explicit fallback for missing renderer.',
        );

        assert(
          'Router fallback UI copy exists',
          /Page failed to load/.test(routerSrc),
          'Expected "Page failed to load" user-facing fallback title.',
        );

        assert(
          'Access gate uses request timeout abort',
          /AbortController/.test(accessGateSrc) &&
            /setTimeout\(\(\) => controller\.abort\(\),\s*10000\)/.test(accessGateSrc),
          'Expected AbortController + 10s timeout abort in verify-access submit flow.',
        );

        assert(
          'Access gate clears timeout in finally',
          /if \(timeoutId !== null\) window\.clearTimeout\(timeoutId\)/.test(accessGateSrc),
          'Expected timeout cleanup guard in finally block.',
        );
      }

      async function checkCssTimeoutBehavior() {
        const originalAppend = document.head.appendChild.bind(document.head);
        const originalSetTimeout = window.setTimeout.bind(window);
        const originalClearTimeout = window.clearTimeout.bind(window);

        let appendCalls = 0;

        // Prevent load/error events from naturally resolving so timeout path is exercised.
        document.head.appendChild = (node) => {
          appendCalls += 1;
          return node;
        };

        // Force fast timeout for test speed while preserving timeout semantics.
        window.setTimeout = (fn, ms, ...args) => {
          const delay = typeof ms === 'number' && ms > 20 ? 5 : ms;
          return originalSetTimeout(fn, delay, ...args);
        };

        window.clearTimeout = (id) => originalClearTimeout(id);

        let timedOut = false;
        try {
          await loadCSS('/__never-load__/timeout-test.css');
        } catch (e) {
          timedOut = /Timed out loading CSS/.test(String(e && e.message));
        } finally {
          document.head.appendChild = originalAppend;
          window.setTimeout = originalSetTimeout;
          window.clearTimeout = originalClearTimeout;
        }

        assert(
          'CSS loader timeout path rejects',
          timedOut,
          'Expected rejection with timeout message.',
        );
        assert(
          'CSS loader attempted to append link element',
          appendCalls > 0,
          `append calls: ${appendCalls}`,
        );
      }

      try {
        await checkSourceContracts();
        await checkCssTimeoutBehavior();
      } catch (e) {
        failures.push('Unhandled error');
        log('Unhandled error', false, String(e && e.stack ? e.stack : e));
      }

      const summary = document.createElement('div');
      summary.className = failures.length ? 'fail' : 'pass';
      summary.style.marginTop = '16px';
      summary.innerHTML = `<strong>${failures.length ? 'FAIL' : 'PASS'}</strong>${
        failures.length ? ` (${failures.length} failure${failures.length > 1 ? 's' : ''})` : ''
      }`;
      results.appendChild(summary);

      console.log('Loading Resilience Smoke Test:', failures.length ? 'FAIL' : 'PASS', failures);
    </script>
  </body>
</html>
